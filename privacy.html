<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보처리방침 - 무지개숲</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #faf9f6;
      --color-primary: #5e9e72;
      --color-accent: #e07b6a;
      --color-text: #28241e;
      --color-muted: #78736a;
      --color-border: #e6e2da;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.7;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    .notice {
      background: var(--color-bg);
      border-left: 4px solid var(--color-primary);
      padding: 20px;
      border-radius: 8px;
      margin: 32px 0;
    }

    .notice h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--color-primary);
    }

    .notice p {
      font-size: 16px;
      color: var(--color-muted);
    }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }
      
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>무지개숲 개인정보처리방침</h1>
    
    <div class="notice">
      <h2>준비중 안내</h2>
      <p>
        현재 개인정보처리방침을 준비중입니다.<br>
        문의사항이 있으시면 아래 이메일로 연락주세요.<br><br>
        contact@leros.kr
      </p>
    </div>
    
    <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
  </div>
</body>
</html>
